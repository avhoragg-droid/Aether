<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aether · NFT маркет Telegram</title>
    <style>
        /* Базовые стили (критический CSS) */
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#141414;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
        #app{visibility:hidden;opacity:0}
        .page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#141414;display:flex;align-items:center;justify-content:center;z-index:10000}
        .page-loader.hidden{display:none}
        .loader svg{width:100px;height:auto;filter:drop-shadow(0 0 10px #D4AF37)}
        /* Остальные стили загружаются асинхронно */
    </style>
    <link rel="preload" as="style" href="styles.css" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="styles.css"></noscript>
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <script>
        // Ленивая загрузка скриптов
        function loadScript(src, defer = true) {
            const script = document.createElement('script');
            script.src = src;
            script.defer = defer;
            document.head.appendChild(script);
        }
        // Загружаем только критически важные скрипты сразу
        loadScript('api.js');
        loadScript('nft-data.js');
        loadScript('gift-animations.js');
        // Остальные загружаем после инициализации
        window.addEventListener('load', () => {
            loadScript('market.js');
            loadScript('cart.js');
            loadScript('my-gifts.js');
            loadScript('seasons.js');
            loadScript('profile.js');
            loadScript('deposit.js');
            loadScript('auth.js');
            loadScript('script.js');
            // Снежинки запустим с задержкой
            setTimeout(() => loadScript('snow.js'), 2000);
        });
    </script>
</head>
<body>
    <div id="pageLoader" class="page-loader"><div class="loader"><svg width="100" height="100" viewBox="0 0 100 100"><path fill="#D4AF37" d="M63,37c-6.7-4-4-27-13-27s-6.3,23-13,27-27,4-27,13,20.3,9,27,13,4,27,13,27,6.3-23,13-27,27-4,27-13-20.3-9-27-13Z"/></svg></div></div>
    <div id="app"></div>
    <script>
        // Скрыть лоадер после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if(loader) loader.classList.add('hidden');
                const app = document.getElementById('app');
                if(app) { app.style.visibility = 'visible'; app.style.opacity = '1'; }
            }, 500);
        });
    </script>
</body>
</html>
